name: Sync version.json from private repo

on:
  repository_dispatch:
    types: [version-updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Update version.json
        run: |
          echo '${{ github.event.client_payload.content }}' > version.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add version.json
          git diff --cached --quiet || git commit -m "Sync version.json: ${{ github.event.client_payload.version }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
